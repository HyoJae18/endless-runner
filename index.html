<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a2535">
<meta property="og:title" content="Endless Runner">
<meta property="og:description" content="무한 러너 게임 - 장애물을 피하고 코인을 모아라!">
<title>Endless Runner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #0d1520;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }
  #wrapper {
    width: 100%;
    max-width: 700px;
    padding: 0 12px;
  }
  #topBar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 4px 8px;
  }
  #topBar span {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
  }
  #topBar strong { color: #fff; font-weight: 600; }
  canvas {
    display: block;
    width: 100%;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    cursor: pointer;
  }
  #hint {
    text-align: center;
    font-size: 12px;
    color: rgba(255,255,255,0.3);
    padding-top: 8px;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
<div id="wrapper">
  <div id="topBar">
    <span>점수 <strong id="scoreVal">0</strong></span>
    <span>🏆 <strong id="hiVal">0</strong></span>
    <span>속도 <strong id="speedVal">1.0x</strong></span>
  </div>
  <canvas id="canvas" width="700" height="220"></canvas>
  <p id="hint">탭 / 클릭 / 스페이스바 → 점프 &nbsp;|&nbsp; 공중에서 한 번 더 → 더블점프</p>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = 700, H = 220, GROUND = 170;

const scoreEl = document.getElementById('scoreVal');
const hiEl    = document.getElementById('hiVal');
const speedEl = document.getElementById('speedVal');

let hiScore = parseInt(localStorage.getItem('hi') || '0');
hiEl.textContent = hiScore;

let state = 'start';
let animId, prevT = null;

const DARK = {
  sky1:'#1a2535', sky2:'#0d1520',
  ground:'#3a5a2e', groundLine:'#2a4020', dirt:'#6b4a2a',
  player:'#6a8ec4', playerShade:'#3e5f8a',
  eye:'#fff', pupil:'#1a1a2e',
  obs:'#e05a48', obsShade:'#9e3020',
  coin:'#f0b429', coinShine:'rgba(255,255,255,0.8)',
  cloud:'rgba(255,255,255,0.07)',
  particle:['#f0b429','#e85d4a','#4a8ae8','#5dbf7a'],
};

let player, obstacles, coins, particles, clouds;
let score, scoreF, speed, frame;
let obsTimer = 0, coinTimer = 0;
let scoreFlashes = [];

function initGame() {
  player = { x:90, y:GROUND, w:30, h:36, vy:0, jumps:0, dead:false, squash:1, squashV:0 };
  obstacles = []; coins = []; particles = []; scoreFlashes = [];
  clouds = [{x:100,y:38,s:1},{x:310,y:22,s:0.8},{x:540,y:48,s:1.2},{x:680,y:32,s:0.9}];
  score=0; scoreF=0; speed=4; frame=0;
  obsTimer=0; coinTimer=0;
}

function jump() {
  if (state === 'start') { state='play'; initGame(); return; }
  if (state === 'dead')  { state='play'; initGame(); return; }
  if (player.dead) return;
  if (player.jumps < 2) {
    player.vy = -11.5 - player.jumps * 1.5;
    player.jumps++;
    player.squash = 0.6;
    player.squashV = 0.4;
    spawnParts(player.x + player.w/2, player.y + player.h, 5, 'jump');
  }
}

canvas.addEventListener('click', jump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, {passive:false});
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); }
});

function spawnParts(x, y, n, type) {
  for (let i=0; i<n; i++) {
    const c = DARK.particle[Math.floor(Math.random()*4)];
    particles.push({
      x, y,
      vx:(Math.random()-0.5)*(type==='die'?7:3.5),
      vy:-Math.random()*(type==='die'?7:3)-1,
      life:1, decay:0.04+Math.random()*0.04,
      r:3+Math.random()*3, color:c
    });
  }
}

function spawnObs() {
  const types=[{w:22,h:28},{w:26,h:44},{w:20,h:60},{w:48,h:22}];
  const t = types[Math.floor(Math.random()*types.length)];
  obstacles.push({x:W+10, y:GROUND+player.h-t.h, w:t.w, h:t.h});
}

function spawnCoins() {
  const yOff=[0,-30,-60][Math.floor(Math.random()*3)];
  for(let i=0;i<5;i++)
    coins.push({x:W+10+i*28, y:GROUND+player.h/2+yOff, r:8, spin:0, collected:false});
}

function rOvlp(a,b){ return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y; }
function cInR(c,r){ const rd=c.r*0.7; return c.x+rd>r.x&&c.x-rd<r.x+r.w&&c.y+rd>r.y&&c.y-rd<r.y+r.h; }

function update(dt) {
  if (player.dead) { frame++; return; }
  speed = Math.min(4 + score * 0.01, 12);
  scoreF += speed * dt * 0.6;
  score = Math.floor(scoreF);
  frame++;

  clouds.forEach(c=>{ c.x -= speed*0.18*dt*0.6; if(c.x<-120) c.x=W+80; });

  player.vy += 0.7*dt;
  player.y  += player.vy*dt;
  if (player.y >= GROUND) { player.y=GROUND; player.vy=0; player.jumps=0; }

  player.squash  += player.squashV*dt;
  player.squashV -= (player.squash-1)*0.5*dt;
  player.squashV *= 0.85;

  obsTimer += dt;
  const obsInt = Math.max(50, 88 - speed*5);
  if (obsTimer > obsInt) { spawnObs(); obsTimer=0; }
  obstacles = obstacles.filter(o=>o.x>-80);
  obstacles.forEach(o=>o.x -= speed*dt);

  coinTimer += dt;
  if (coinTimer > 115) { if(Math.random()<0.5) spawnCoins(); coinTimer=0; }
  coins = coins.filter(c=>c.x>-30&&!c.collected);
  coins.forEach(c=>{ c.x-=speed*dt; c.spin+=0.15*dt; });

  const ph={x:player.x+4, y:player.y+2, w:player.w-8, h:player.h-2};

  for (const o of obstacles) {
    if (rOvlp(ph,o)) {
      player.dead=true;
      spawnParts(player.x+player.w/2, player.y+player.h/2, 16, 'die');
      if (score>hiScore) { hiScore=score; localStorage.setItem('hi', hiScore); }
      break;
    }
  }

  coins.forEach(c=>{
    if (!c.collected && cInR(c,ph)) {
      c.collected=true; score+=10; scoreF+=10;
      spawnParts(c.x,c.y,6,'coin');
      scoreFlashes.push({x:c.x,y:c.y-10,life:1,text:'+10'});
    }
  });

  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x+=p.vx*dt*0.6; p.y+=p.vy*dt*0.6;
    p.vy+=0.3*dt*0.6; p.life-=p.decay*dt*0.6;
  });
  scoreFlashes=scoreFlashes.filter(s=>s.life>0);
  scoreFlashes.forEach(s=>{s.y-=0.5*dt*0.5; s.life-=0.04*dt*0.5;});

  scoreEl.textContent = score;
  hiEl.textContent    = Math.max(hiScore, score);
  speedEl.textContent = (speed/4).toFixed(1)+'x';
}

function rr(x,y,w,h,r){
  ctx.beginPath();
  ctx.roundRect(x,y,w,h,r);
}

function drawScene() {
  const C = DARK;
  const grad = ctx.createLinearGradient(0,0,0,GROUND);
  grad.addColorStop(0, C.sky2); grad.addColorStop(1, C.sky1);
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,GROUND);

  ctx.fillStyle=C.cloud;
  clouds.forEach(c=>{
    ctx.beginPath();
    ctx.ellipse(c.x,c.y,40*c.s,18*c.s,0,0,Math.PI*2);
    ctx.ellipse(c.x+25*c.s,c.y+5*c.s,28*c.s,14*c.s,0,0,Math.PI*2);
    ctx.ellipse(c.x-22*c.s,c.y+4*c.s,22*c.s,12*c.s,0,0,Math.PI*2);
    ctx.fill();
  });

  ctx.fillStyle=C.ground; ctx.fillRect(0,GROUND,W,H-GROUND);
  ctx.fillStyle=C.groundLine; ctx.fillRect(0,GROUND,W,3);
  ctx.fillStyle=C.dirt; ctx.fillRect(0,GROUND+3,W,8);
  ctx.fillStyle=C.groundLine;
  for(let i=0;i<8;i++){
    const gx=((frame*speed*0.3+i*90)%(W+10))-5;
    ctx.fillRect(gx,GROUND+4,30,2);
  }

  coins.forEach(c=>{
    const sx=Math.abs(Math.cos(c.spin));
    ctx.save(); ctx.translate(c.x,c.y); ctx.scale(sx,1);
    ctx.fillStyle=C.coin; ctx.beginPath(); ctx.ellipse(0,0,c.r,c.r,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=C.coinShine; ctx.beginPath(); ctx.ellipse(-2,-2,3,3,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  obstacles.forEach(o=>{
    ctx.fillStyle=C.obs; rr(o.x,o.y,o.w,o.h,3); ctx.fill();
    ctx.fillStyle=C.obsShade;
    ctx.save(); rr(o.x,o.y,o.w,o.h,3); ctx.clip();
    ctx.fillRect(o.x+o.w*0.65,o.y,o.w*0.35,o.h); ctx.restore();
    ctx.fillStyle=C.obsShade;
    for(let i=0;i<3;i++){
      const sx=o.x+4+i*(o.w/3-1);
      ctx.beginPath(); ctx.moveTo(sx,o.y); ctx.lineTo(sx+5,o.y-9); ctx.lineTo(sx+10,o.y); ctx.fill();
    }
  });

  // player
  const p=player;
  const sx2 = p.squash>1 ? 2-p.squash : p.squash;
  ctx.save();
  ctx.translate(p.x+p.w/2, p.y+p.h);
  ctx.scale(sx2, p.squash);
  ctx.translate(-p.w/2, -p.h);
  if(p.dead) ctx.globalAlpha=0.5+Math.sin(frame*0.3)*0.5;
  ctx.fillStyle=C.player; rr(0,6,p.w,p.h-6,6); ctx.fill();
  ctx.save(); rr(0,6,p.w,p.h-6,6); ctx.clip();
  ctx.fillStyle=C.playerShade; ctx.fillRect(p.w*0.6,6,p.w*0.4,p.h); ctx.restore();
  ctx.fillStyle=C.player; rr(2,0,p.w-4,14,5); ctx.fill();
  ctx.fillStyle=C.eye; ctx.beginPath(); ctx.ellipse(p.w*0.7,7,4,4,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=C.pupil; ctx.beginPath(); ctx.ellipse(p.w*0.7+1,7,2,2,0,0,Math.PI*2); ctx.fill();
  const lo=Math.sin(frame*0.25)*4;
  ctx.fillStyle=C.playerShade;
  ctx.fillRect(4,p.h-10+lo,8,10); ctx.fillRect(p.w-12,p.h-10-lo,8,10);
  ctx.restore(); ctx.globalAlpha=1;

  particles.forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;

  scoreFlashes.forEach(s=>{
    ctx.globalAlpha=s.life; ctx.fillStyle='#5dbf7a';
    ctx.font='bold 13px sans-serif'; ctx.fillText(s.text,s.x,s.y);
  });
  ctx.globalAlpha=1;

  if (player.dead && frame>20) {
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.fillStyle='#fff'; ctx.font='bold 26px sans-serif';
    ctx.fillText('게임 오버', W/2, H/2-20);
    ctx.font='15px sans-serif';
    ctx.fillText('점수: '+score+(score>=hiScore&&score>0?' 🏆 최고기록!':''), W/2, H/2+8);
    ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.font='13px sans-serif';
    ctx.fillText('탭 / 클릭 / 스페이스바로 재시작', W/2, H/2+32);
    ctx.textAlign='left';
  }

  if (state==='start') {
    ctx.fillStyle='rgba(0,0,0,0.45)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.fillStyle='#fff'; ctx.font='bold 28px sans-serif';
    ctx.fillText('Endless Runner', W/2, H/2-22);
    ctx.fillStyle='rgba(255,255,255,0.8)'; ctx.font='14px sans-serif';
    ctx.fillText('탭 / 클릭 / 스페이스바로 시작!', W/2, H/2+10);
    ctx.textAlign='left';
  }
}

function loop(t) {
  if (!prevT) prevT=t;
  const dt=Math.min((t-prevT)/16.67, 3);
  prevT=t;
  ctx.clearRect(0,0,W,H);
  if (state==='play') update(dt);
  drawScene();
  animId=requestAnimationFrame(loop);
}

initGame();
animId=requestAnimationFrame(loop);
</script>
</body>
</html>
