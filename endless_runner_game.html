
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: transparent; }
#gameWrap {
  width: 100%;
  max-width: 700px;
  margin: 0 auto;
  padding: 1rem 0;
  font-family: var(--font-sans);
  user-select: none;
}
#canvas {
  display: block;
  width: 100%;
  border-radius: var(--border-radius-lg);
  border: 0.5px solid var(--color-border-tertiary);
  cursor: pointer;
  touch-action: manipulation;
}
#ui {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 4px 4px;
}
#ui span {
  font-size: 14px;
  color: var(--color-text-secondary);
}
#ui strong {
  color: var(--color-text-primary);
  font-weight: 500;
}
#hint {
  text-align: center;
  font-size: 13px;
  color: var(--color-text-tertiary);
  padding-top: 6px;
}
</style>

<div id="gameWrap">
  <canvas id="canvas" width="700" height="220"></canvas>
  <div id="ui">
    <span>점수 <strong id="scoreVal">0</strong></span>
    <span>최고 <strong id="hiVal">0</strong></span>
    <span id="speedLabel">속도 <strong id="speedVal">1.0x</strong></span>
  </div>
  <p id="hint">클릭 또는 스페이스바로 점프 · 공중에서 한 번 더 누르면 더블점프!</p>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = 700, H = 220;
const GROUND = 170;

const scoreEl = document.getElementById('scoreVal');
const hiEl = document.getElementById('hiVal');
const speedEl = document.getElementById('speedVal');

let hiScore = 0;
let state = 'start'; // start | play | dead
let animId;
let lastTime = 0;

const COLORS = {
  sky1: '#d4eef7', sky2: '#a8d8ea',
  ground: '#7c9c6e', groundLine: '#5a7a52',
  dirt: '#b5845a',
  player: '#4a5e8a', playerShade: '#2e3f5c',
  eye: '#fff', pupil: '#1a1a2e',
  obs: '#c94b3c', obsShade: '#8c2e22',
  coin: '#f0b429', coinShine: '#fff',
  cloud: '#fff',
  particle: ['#f0b429','#e85d4a','#4a8ae8','#5dbf7a'],
  scoreFlash: '#5dbf7a',
};

function isDark() {
  return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
}

function getColors() {
  if (isDark()) return {
    ...COLORS,
    sky1: '#1a2535', sky2: '#0d1520',
    ground: '#3a5a2e', groundLine: '#2a4020',
    dirt: '#6b4a2a',
    cloud: 'rgba(255,255,255,0.12)',
  };
  return COLORS;
}

// --- Game state ---
let player, obstacles, coins, particles, clouds;
let score, scoreF, speed, frame, jumpLock;
let bgX = 0;

function initGame() {
  player = {
    x: 90, y: GROUND, w: 30, h: 36,
    vy: 0, jumps: 0, maxJumps: 2,
    dead: false, squash: 1, squashV: 0,
    flash: 0,
  };
  obstacles = [];
  coins = [];
  particles = [];
  clouds = [{x:100,y:40,s:1},{x:300,y:25,s:0.8},{x:550,y:50,s:1.2},{x:680,y:35,s:0.9}];
  score = 0; scoreF = 0; speed = 4; frame = 0; jumpLock = false;
  bgX = 0;
}

function jump() {
  if (state === 'start') { state = 'play'; initGame(); startLoop(); return; }
  if (state === 'dead') { state = 'play'; initGame(); return; }
  if (player.dead) return;
  if (player.jumps < player.maxJumps) {
    player.vy = -11.5 - (player.jumps * 1.5);
    player.jumps++;
    player.squash = 0.6;
    player.squashV = 0.4;
    spawnParticles(player.x + player.w/2, player.y + player.h, 5, 'jump');
  }
}

canvas.addEventListener('click', jump);
document.addEventListener('keydown', e => { if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); } });
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, {passive: false});

function spawnParticles(x, y, n, type) {
  for (let i = 0; i < n; i++) {
    const c = COLORS.particle[Math.floor(Math.random()*4)];
    particles.push({
      x, y,
      vx: (Math.random()-0.5) * (type==='die'?6:3),
      vy: -Math.random() * (type==='die'?6:3) - 1,
      life: 1, decay: 0.04 + Math.random()*0.04,
      r: 3 + Math.random()*3, color: c,
      type
    });
  }
}

function spawnObs() {
  const types = ['low','mid','tall','wide'];
  const t = types[Math.floor(Math.random()*types.length)];
  let w, h;
  if (t === 'low')  { w=22; h=28; }
  else if (t==='mid') { w=26; h=44; }
  else if (t==='tall') { w=20; h=60; }
  else { w=48; h=22; }
  obstacles.push({ x: W+10, y: GROUND+player.h-h, w, h, type:t });
}

function spawnCoins() {
  const yOff = [0,-30,-60][Math.floor(Math.random()*3)];
  for (let i=0; i<5; i++) {
    coins.push({ x: W+10+i*28, y: GROUND+player.h/2+yOff, r:8, spin:0, collected:false });
  }
}

function rectOverlap(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function circInRect(c, r) {
  const cx = c.x, cy = c.y, rad = c.r * 0.7;
  return cx+rad > r.x && cx-rad < r.x+r.w && cy+rad > r.y && cy-rad < r.y+r.h;
}

let obsTimer = 0, coinTimer = 0;
let scoreFlashes = [];

function update(dt) {
  if (player.dead) { frame++; return; }
  const C = getColors();
  speed = Math.min(4 + score * 0.01, 11);
  scoreF += speed * dt * 0.6;
  score = Math.floor(scoreF);
  frame++;

  // clouds
  clouds.forEach(c => { c.x -= speed * 0.2 * dt * 0.6; if (c.x < -120) c.x = W + 80; });

  // player gravity
  player.vy += 0.7 * dt;
  player.y += player.vy * dt;
  if (player.y >= GROUND) { player.y = GROUND; player.vy = 0; player.jumps = 0; }

  // squash
  player.squash += player.squashV * dt;
  player.squashV -= (player.squash - 1) * 0.5 * dt;
  player.squashV *= 0.85;
  player.flash = Math.max(0, player.flash - dt * 0.1);

  // obstacles
  obsTimer += dt;
  const obsInterval = Math.max(55, 90 - speed * 5);
  if (obsTimer > obsInterval) { spawnObs(); obsTimer = 0; }
  obstacles = obstacles.filter(o => o.x > -80);
  obstacles.forEach(o => { o.x -= speed * dt; });

  // coins
  coinTimer += dt;
  if (coinTimer > 120) { if (Math.random() < 0.5) spawnCoins(); coinTimer = 0; }
  coins = coins.filter(c => c.x > -30 && !c.collected);
  coins.forEach(c => { c.x -= speed * dt; c.spin += 0.15 * dt; });

  // player hitbox (slightly inset)
  const ph = { x: player.x+4, y: player.y+2, w: player.w-8, h: player.h-2 };

  // collision - obstacles
  for (const o of obstacles) {
    if (rectOverlap(ph, o)) {
      player.dead = true;
      spawnParticles(player.x+player.w/2, player.y+player.h/2, 14, 'die');
      if (score > hiScore) hiScore = score;
      break;
    }
  }

  // collision - coins
  coins.forEach(c => {
    if (!c.collected && circInRect(c, ph)) {
      c.collected = true;
      score += 10; scoreF += 10;
      spawnParticles(c.x, c.y, 6, 'coin');
      scoreFlashes.push({ x: c.x, y: c.y-10, life: 1, text: '+10' });
    }
  });

  // particles
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx * dt * 0.6;
    p.y += p.vy * dt * 0.6;
    p.vy += 0.3 * dt * 0.6;
    p.life -= p.decay * dt * 0.6;
  });

  scoreFlashes = scoreFlashes.filter(s => s.life > 0);
  scoreFlashes.forEach(s => { s.y -= 0.5 * dt * 0.5; s.life -= 0.04 * dt * 0.5; });

  scoreEl.textContent = score;
  hiEl.textContent = Math.max(hiScore, score);
  speedEl.textContent = (speed/4).toFixed(1) + 'x';
}

function drawCloud(x, y, s) {
  const C = getColors();
  ctx.fillStyle = C.cloud;
  ctx.beginPath();
  ctx.ellipse(x, y, 40*s, 18*s, 0, 0, Math.PI*2);
  ctx.ellipse(x+25*s, y+5*s, 28*s, 14*s, 0, 0, Math.PI*2);
  ctx.ellipse(x-22*s, y+4*s, 22*s, 12*s, 0, 0, Math.PI*2);
  ctx.fill();
}

function drawPlayer(p) {
  const C = getColors();
  const cx = p.x + p.w/2;
  const cy = p.y + p.h/2;
  const sx = p.squash > 1 ? 2 - p.squash : p.squash;
  const sy = p.squash;

  ctx.save();
  ctx.translate(cx, p.y + p.h);
  ctx.scale(sx, sy);
  ctx.translate(-p.w/2, -p.h);

  if (p.dead) {
    ctx.globalAlpha = 0.5 + Math.sin(frame * 0.3) * 0.5;
  }

  // body
  ctx.fillStyle = C.player;
  ctx.beginPath();
  ctx.roundRect(0, 6, p.w, p.h-6, 6);
  ctx.fill();

  // shade
  ctx.fillStyle = C.playerShade;
  ctx.fillRect(p.w*0.6, 6, p.w*0.35, p.h-6);
  ctx.beginPath();
  ctx.roundRect(p.w*0.6, 6, p.w*0.35, p.h-6, [0,6,6,0]);
  ctx.fill();

  // head
  ctx.fillStyle = C.player;
  ctx.beginPath();
  ctx.roundRect(2, 0, p.w-4, 14, 5);
  ctx.fill();

  // eye
  ctx.fillStyle = C.eye;
  ctx.beginPath();
  ctx.ellipse(p.w*0.7, 7, 4, 4, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = C.pupil;
  ctx.beginPath();
  ctx.ellipse(p.w*0.7+1, 7, 2, 2, 0, 0, Math.PI*2);
  ctx.fill();

  // legs
  const legOff = Math.sin(frame * 0.25) * 4;
  ctx.fillStyle = C.playerShade;
  ctx.fillRect(4, p.h-10+legOff, 8, 10);
  ctx.fillRect(p.w-12, p.h-10-legOff, 8, 10);

  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawObstacle(o) {
  const C = getColors();
  ctx.fillStyle = C.obs;
  ctx.beginPath();
  ctx.roundRect(o.x, o.y, o.w, o.h, 3);
  ctx.fill();
  ctx.fillStyle = C.obsShade;
  ctx.fillRect(o.x + o.w*0.65, o.y, o.w*0.3, o.h);
  ctx.beginPath();
  ctx.roundRect(o.x + o.w*0.65, o.y, o.w*0.3, o.h, [0,3,3,0]);
  ctx.fill();
  // spikes on top
  ctx.fillStyle = C.obsShade;
  for (let i=0; i<3; i++) {
    const sx = o.x + 4 + i * (o.w/3 - 1);
    ctx.beginPath();
    ctx.moveTo(sx, o.y);
    ctx.lineTo(sx+5, o.y-9);
    ctx.lineTo(sx+10, o.y);
    ctx.fill();
  }
}

function drawCoin(c) {
  const C = getColors();
  const scaleX = Math.abs(Math.cos(c.spin));
  ctx.save();
  ctx.translate(c.x, c.y);
  ctx.scale(scaleX, 1);
  ctx.fillStyle = C.coin;
  ctx.beginPath();
  ctx.ellipse(0, 0, c.r, c.r, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = C.coinShine;
  ctx.beginPath();
  ctx.ellipse(-2, -2, 3, 3, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawScene() {
  const C = getColors();

  // sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, GROUND);
  grad.addColorStop(0, C.sky2);
  grad.addColorStop(1, C.sky1);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, GROUND);

  // clouds
  clouds.forEach(c => drawCloud(c.x, c.y, c.s));

  // ground
  ctx.fillStyle = C.ground;
  ctx.fillRect(0, GROUND, W, H - GROUND);
  ctx.fillStyle = C.groundLine;
  ctx.fillRect(0, GROUND, W, 3);
  // dirt line
  ctx.fillStyle = C.dirt;
  ctx.fillRect(0, GROUND+3, W, 8);

  // ground details
  ctx.fillStyle = C.groundLine;
  for (let i=0; i<8; i++) {
    const gx = ((frame * speed * 0.3 + i * 90) % (W+10)) - 5;
    ctx.fillRect(gx, GROUND+4, 30, 2);
  }

  // coins
  coins.forEach(drawCoin);

  // obstacles
  obstacles.forEach(drawObstacle);

  // player
  drawPlayer(player);

  // particles
  particles.forEach(p => {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // score flashes
  scoreFlashes.forEach(s => {
    ctx.globalAlpha = s.life;
    ctx.fillStyle = COLORS.scoreFlash;
    ctx.font = 'bold 13px ' + getComputedStyle(document.body).fontFamily;
    ctx.fillText(s.text, s.x, s.y);
  });
  ctx.globalAlpha = 1;

  // death screen
  if (player.dead && frame > 20) {
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 26px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('게임 오버', W/2, H/2 - 18);
    ctx.font = '15px sans-serif';
    ctx.fillText('점수: ' + score + (score >= hiScore && score > 0 ? '  🏆 최고기록!' : ''), W/2, H/2 + 10);
    ctx.font = '13px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText('클릭하거나 스페이스바를 눌러 재시작', W/2, H/2 + 36);
    ctx.textAlign = 'left';
  }

  // start screen
  if (state === 'start') {
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 28px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Endless Runner', W/2, H/2 - 22);
    ctx.font = '14px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillText('클릭하거나 스페이스바를 눌러 시작!', W/2, H/2 + 10);
    ctx.textAlign = 'left';
  }
}

let prevT = null;
function loop(t) {
  if (!prevT) prevT = t;
  const dt = Math.min((t - prevT) / 16.67, 3);
  prevT = t;

  ctx.clearRect(0, 0, W, H);
  if (state === 'play') update(dt);
  drawScene();
  animId = requestAnimationFrame(loop);
}

function startLoop() {
  if (animId) cancelAnimationFrame(animId);
  prevT = null;
  animId = requestAnimationFrame(loop);
}

initGame();
startLoop();
</script>
